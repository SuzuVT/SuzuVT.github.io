<body class="linktree-mode">

    <div id="header-particles" style="position: fixed; height: 100vh;"></div>

    <div class="linktree-container">

            <img src="../rsc/Suzu Kurai Logo.png" alt="Suzu Logo" class="linktree-avatar">
            <h1>SUZU KURAI</h1>
        </header>

        <div class="link-list">
            <a href="/redes/twitch" target="_blank" class="link-item">
                <img src="../rsc/twitch-icon.png" alt="" class="link-icon">
                <span>TWITCH</span>
            </a>

            <a href="/redes/discord" target="_blank" class="link-item">
                <img src="../rsc/discord-icon.png" alt="" class="link-icon">

            <a href="/redes/youtube" target="_blank" class="link-item">
                <img src="../rsc/youtube-icon.png" alt="" class="link-icon">
                <span>YOUTUBE</span>
            </a>

            <a href="/redes/tiktok" target="_blank" class="link-item">
                <img src="../rsc/tiktok-icon.png" alt="" class="link-icon">

<footer>
    <p>© 2026 Suzu Kurai — Todos los pactos reservados</p>
</footer>
    <script>
        // Reutilizamos tu función de partículas para el fondo
        function createParticles() {
            const container = document.getElementById('header-particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 3 + 1 + 'px';
                p.style.width = size; p.style.height = size;
                p.style.animationDuration = Math.random() * 10 + 5 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
    </script>
</body>
